<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Contact Us - Sayoori woman</title>
</head>

<body>
    <div class="hero-section">
        <div class="section1">
            <h1>Contact Us</h1>
            <p class="spotted-text">Spotted something you love? Don’t overthink it; we’d love to make it yours. Drop us
                a message using any of the options below.</p>
            <span class="section1-icons">
                <span class="inner-span">
                    <i class="bi bi-instagram" style="color: #ff0829;"></i>
                    <p style="color: #ff0829;">@SAYOORI.WOMAN</p>
                </span>
                <span class="inner-span">
                    <i class="bi bi-facebook" style="color: #5982d3;"></i>
                    <p style="color: #5982d3;">SAYOORI WOMAN</p>
                </span>
                <span class="inner-span">
                    <i class="bi bi-whatsapp" style="color: #4acf35;"></i>
                    <p style="color: #4acf35;">+91 9310129058</p>
                </span>
            </span>
        </div>
        <div class="section2">
            <form>
                <span class="form-section1">
                    <div class="input1">
                        <label for="">First Name <span class="required">*</span></label>
                        <input type="text" name="" id="">
                    </div>
                    <div class="input1">
                        <label for="">Phone Number <span class="required">*</span></label>
                        <input type="text">
                    </div>
                </span>
                <span class="form-section2">
                    <span class="f2-label">
                        <label for="" style="margin-bottom: 10px;">Message <span class="required">*</span></label>
                        <label for="" style="color: gray;">0 / 180</label>
                    </span>
                    <input type="text" name="" id="">
                </span>

                <button class="btn-design">SUBMIT</button>
                
            </form>
        </div>
    </div>
</body>

</html>
